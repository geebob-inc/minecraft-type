<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Voxel Engine V2</title>
<style>
body { margin:0; overflow:hidden; }
canvas { display:block; }
#ui {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-family:sans-serif;
  background:rgba(0,0,0,0.5);
  padding:10px;
}
</style>
</head>
<body>

<div id="ui">
WASD move | Mouse look | Space jump<br>
Auto-save enabled
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
// ======================
// BASIC SETUP
// ======================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.DirectionalLight(0xffffff, 1);
scene.add(light);
scene.add(new THREE.AmbientLight(0xffffff, 0.2));

// ======================
// MOUSE LOOK (FPS)
// ======================
let yaw = 0, pitch = 0;

document.body.onclick = () => {
  document.body.requestPointerLock();
};

document.addEventListener("mousemove",(e)=>{
  if(document.pointerLockElement !== document.body) return;
  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-1.5, Math.min(1.5, pitch));
});

// ======================
// INPUT
// ======================
const keys = {};
addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// ======================
// VOXEL WORLD STORAGE
// ======================
const world = new Map();

const key = (x,y,z)=>`${x},${y},${z}`;

function setBlock(x,y,z,v){
  world.set(key(x,y,z), v);
}
function getBlock(x,y,z){
  return world.get(key(x,y,z));
}

// ======================
// BIOMES (noise-based)
// ======================
function noise(x,z){
  return Math.sin(x*0.1)*Math.cos(z*0.1);
}

function getBiome(x,z){
  const n = noise(x,z);
  if(n < -0.2) return "desert";
  if(n > 0.2) return "snow";
  return "forest";
}

// ======================
// TERRAIN GEN
// ======================
function height(x,z){
  return Math.floor(noise(x,z)*5 + 5);
}

function generateChunk(cx,cz){
  const size = 16;

  for(let x=0;x<size;x++){
    for(let z=0;z<size;z++){

      const wx = cx*size + x;
      const wz = cz*size + z;

      const h = height(wx,wz);
      const biome = getBiome(wx,wz);

      let topColor;

      if(biome==="desert") topColor = 0xE6D090;
      if(biome==="forest") topColor = 0x3B8B3B;
      if(biome==="snow") topColor = 0xFFFFFF;

      for(let y=0;y<h;y++){
        setBlock(wx,y,wz,0x777777); // stone
      }

      setBlock(wx,h,wz,topColor);

    }
  }
}

// ======================
// CHUNKS (infinite system)
// ======================
const loaded = new Set();

function loadChunks(px,pz){
  const range = 2;

  for(let x=-range;x<=range;x++){
    for(let z=-range;z<=range;z++){
      const id = `${x},${z}`;
      if(loaded.has(id)) continue;
      generateChunk(x,z);
      loaded.add(id);
    }
  }
}

// ======================
// GREEDY MESHING (SIMPLIFIED)
// ======================
const geom = new THREE.BoxGeometry(1,1,1);
const mat = new THREE.MeshLambertMaterial({ color: 0xffffff });

let mesh;

function rebuildMesh(){

  if(mesh) scene.remove(mesh);

  const g = new THREE.BufferGeometry();
  const positions = [];

  for(let [k,v] of world){

    const [x,y,z] = k.split(",").map(Number);

    // simple visibility check (skip hidden blocks)
    if(getBlock(x,y+1,z) && getBlock(x,y-1,z) &&
       getBlock(x+1,y,z) && getBlock(x-1,y,z) &&
       getBlock(x,y,z+1) && getBlock(x,y,z-1)) continue;

    positions.push(
      x,y,z
    );
  }

  g.setAttribute("position", new THREE.Float32BufferAttribute(positions,3));

  mesh = new THREE.Mesh(geom, mat);
  scene.add(mesh);
}

// ======================
// PLAYER PHYSICS + COLLISION
// ======================
let velY = 0;
let onGround = false;

function collide(x,y,z){
  return world.has(key(Math.floor(x),Math.floor(y),Math.floor(z)));
}

// ======================
// CAMERA START
// ======================
camera.position.set(0,10,0);

// ======================
// SAVE / LOAD
// ======================
function save(){
  localStorage.setItem("world", JSON.stringify([...world]));
}

function load(){
  const data = JSON.parse(localStorage.getItem("world")||"[]");
  world.clear();
  for(let [k,v] of data){
    world.set(k,v);
  }
}

// auto-load
load();

// ======================
// GAME LOOP
// ======================
function animate(){
  requestAnimationFrame(animate);

  loadChunks(camera.position.x/16, camera.position.z/16);

  // movement
  const speed = 0.1;

  const forward = new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
  const right = new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));

  if(keys["w"]) camera.position.add(forward.clone().multiplyScalar(speed));
  if(keys["s"]) camera.position.add(forward.clone().multiplyScalar(-speed));
  if(keys["a"]) camera.position.add(right.clone().multiplyScalar(-speed));
  if(keys["d"]) camera.position.add(right.clone().multiplyScalar(speed));

  // gravity
  velY -= 0.01;
  camera.position.y += velY;

  if(collide(camera.position.x, camera.position.y-1, camera.position.z)){
    velY = 0;
    onGround = true;
    camera.position.y = Math.ceil(camera.position.y);
  }

  if(keys[" "] && onGround){
    velY = 0.2;
    onGround = false;
  }

  camera.rotation.set(pitch,yaw,0);

  rebuildMesh();

  save();

  renderer.render(scene,camera);
}

animate();

// resize
addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
