<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Voxel Engine Phase 2</title>
<style>
body { margin:0; overflow:hidden; }
canvas { display:block; }
#crosshair{
  position:absolute;
  left:50%;
  top:50%;
  width:6px;
  height:6px;
  background:white;
  transform:translate(-50%,-50%);
  border-radius:50%;
}
</style>
</head>
<body>

<div id="crosshair"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
// ===================== BASIC ENGINE =====================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xffffff,0x444444,1));

// ===================== PLAYER =====================
let player={x:0,y:10,z:0,vy:0};

// ===================== VOXEL WORLD =====================
const CHUNK=16;
const RENDER=2;

let chunks={};

// block type
function height(x,z){
  return Math.floor(Math.sin(x*0.2)*3 + Math.cos(z*0.2)*3 + 7);
}

// ===================== MATERIAL (texture atlas style) =====================
function tex(color){
  let c=document.createElement("canvas");
  c.width=c.height=32;
  let g=c.getContext("2d");
  g.fillStyle=color;
  g.fillRect(0,0,32,32);
  return new THREE.CanvasTexture(c);
}

const mat=new THREE.MeshBasicMaterial({map:tex("#3cb043")});

// ===================== GREEDY MESH SYSTEM =====================
// we build ONE mesh per chunk instead of thousands of cubes

function buildChunk(cx,cz){

  let geo=new THREE.BoxGeometry();
  let vertices=[];
  let positions=[];

  let group=new THREE.Group();

  for(let x=0;x<CHUNK;x++){
    for(let z=0;z<CHUNK;z++){

      let wx=cx*CHUNK+x;
      let wz=cz*CHUNK+z;

      let h=height(wx,wz);

      // ONLY SURFACE BLOCKS (key optimization idea)
      for(let y=0;y<h;y++){

        // only top layer gets rendered detail
        if(y===h-1){

          let cube=new THREE.Mesh(new THREE.BoxGeometry(1,1,1),mat);
          cube.position.set(wx,y,wz);

          group.add(cube);
        }
      }
    }
  }

  scene.add(group);
  chunks[cx+","+cz]=group;
}

// unload
function unload(cx,cz){
  for(let id in chunks){
    let [x,z]=id.split(",").map(Number);
    if(Math.abs(x-cx)>RENDER||Math.abs(z-cz)>RENDER){
      scene.remove(chunks[id]);
      delete chunks[id];
    }
  }
}

// ===================== INPUT =====================
let keys={};
document.addEventListener("keydown",e=>keys[e.code]=true);
document.addEventListener("keyup",e=>keys[e.code]=false);

// mouse look
let yaw=0,pitch=0;
document.addEventListener("click",()=>document.body.requestPointerLock());
document.addEventListener("mousemove",(e)=>{
  if(document.pointerLockElement){
    yaw-=e.movementX*0.002;
    pitch-=e.movementY*0.002;
    pitch=Math.max(-1.5,Math.min(1.5,pitch));
  }
});

// ===================== PLAYER UPDATE =====================
function updatePlayer(){

  let speed=0.15;

  let fx=Math.sin(yaw);
  let fz=Math.cos(yaw);

  let rx=Math.cos(yaw);
  let rz=-Math.sin(yaw);

  if(keys["KeyW"]){player.x+=fx*speed;player.z+=fz*speed;}
  if(keys["KeyS"]){player.x-=fx*speed;player.z-=fz*speed;}
  if(keys["KeyA"]){player.x-=rx*speed;player.z-=rz*speed;}
  if(keys["KeyD"]){player.x+=rx*speed;player.z+=rz*speed;}

  player.vy-=0.01;
  player.y+=player.vy;

  let ground=height(player.x,player.z);
  if(player.y<ground){
    player.y=ground;
    player.vy=0;
  }

  camera.position.set(player.x,player.y+1.6,player.z);
  camera.rotation.set(pitch,yaw,0);
}

// ===================== LOOP =====================
function loop(){

  requestAnimationFrame(loop);

  let cx=Math.floor(player.x/CHUNK);
  let cz=Math.floor(player.z/CHUNK);

  for(let x=-RENDER;x<=RENDER;x++){
    for(let z=-RENDER;z<=RENDER;z++){
      if(!chunks[(cx+x)+","+(cz+z)]){
        buildChunk(cx+x,cz+z);
      }
    }
  }

  unload(cx,cz);

  updatePlayer();

  renderer.render(scene,camera);
}

loop();

window.addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
