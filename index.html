<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Minecraft Engine Level</title>
<style>
body { margin:0; overflow:hidden; cursor:crosshair; }
canvas { display:block; }

#crosshair {
  position:absolute;
  left:50%;
  top:50%;
  width:6px;
  height:6px;
  background:white;
  transform:translate(-50%,-50%);
  border-radius:50%;
}

#hotbar {
  position:absolute;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  color:white;
  font-family:sans-serif;
}
.slot {
  display:inline-block;
  width:40px;
  height:40px;
  margin:3px;
  border:2px solid white;
  text-align:center;
  line-height:40px;
}
</style>
</head>
<body>

<div id="crosshair"></div>
<div id="hotbar">
  <div class="slot">1</div>
  <div class="slot">2</div>
  <div class="slot">3</div>
  <div class="slot">4</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
// ===================== SETUP =====================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,1));

// ===================== TEXTURES =====================
function tex(color){
  const c = document.createElement("canvas");
  c.width = c.height = 32;
  const g = c.getContext("2d");
  g.fillStyle = color;
  g.fillRect(0,0,32,32);
  return new THREE.CanvasTexture(c);
}

const mats = {
  grass:new THREE.MeshBasicMaterial({map:tex("#3cb043")}),
  dirt:new THREE.MeshBasicMaterial({map:tex("#8B5A2B")}),
  stone:new THREE.MeshBasicMaterial({map:tex("#777")}),
  wood:new THREE.MeshBasicMaterial({map:tex("#8B4513")}),
  water:new THREE.MeshBasicMaterial({map:tex("#1e90ff"),transparent:true,opacity:0.6})
};

// ===================== WORLD DATA =====================
const CHUNK = 16;
const RENDER = 2;

let chunks = {};
let blocks = new Map();

const geo = new THREE.BoxGeometry(1,1,1);

// ===================== NOISE =====================
function h(x,z){
  return Math.floor(
    Math.sin(x*0.2)*4 +
    Math.cos(z*0.2)*4 + 8
  );
}

// ===================== BLOCK =====================
function key(x,y,z){ return x+","+y+","+z; }

function addBlock(x,y,z,type){
  const m = new THREE.Mesh(geo,mats[type]);
  m.position.set(x,y,z);
  scene.add(m);
  blocks.set(key(x,y,z), type);
  return m;
}

// ===================== CHUNKS =====================
function genChunk(cx,cz){
  let id = cx+","+cz;
  if(chunks[id]) return;

  let list = [];

  for(let x=0;x<CHUNK;x++){
    for(let z=0;z<CHUNK;z++){

      let wx = cx*CHUNK+x;
      let wz = cz*CHUNK+z;

      let height = h(wx,wz);

      // terrain
      for(let y=0;y<height;y++){
        let t = "stone";
        if(y===height-1) t="grass";
        else if(y>height-3) t="dirt";

        list.push(addBlock(wx,y,wz,t));
      }

      // water
      for(let y=0;y<5;y++){
        list.push(addBlock(wx,y,wz,"water"));
      }

      // trees
      if(Math.random()>0.97){
        for(let t=0;t<4;t++){
          list.push(addBlock(wx,height+t,wz,"wood"));
        }
      }
    }
  }

  chunks[id]=list;
}

// unload far chunks
function unload(cx,cz){
  for(let id in chunks){
    let [x,z]=id.split(",").map(Number);
    if(Math.abs(x-cx)>RENDER || Math.abs(z-cz)>RENDER){
      chunks[id].forEach(b=>scene.remove(b));
      delete chunks[id];
    }
  }
}

// ===================== PLAYER =====================
camera.position.set(0,10,0);

let yaw=0,pitch=0;
document.addEventListener("click",()=>document.body.requestPointerLock());

document.addEventListener("mousemove",e=>{
  if(document.pointerLockElement){
    yaw -= e.movementX*0.002;
    pitch -= e.movementY*0.002;
    pitch=Math.max(-1.5,Math.min(1.5,pitch));
    camera.rotation.set(pitch,yaw,0);
  }
});

let keys={};
document.addEventListener("keydown",e=>keys[e.code]=true);
document.addEventListener("keyup",e=>keys[e.code]=false);

// ===================== COLLISION ENGINE =====================
function collide(x,y,z){
  return blocks.has(key(Math.round(x),Math.round(y),Math.round(z)));
}

// ===================== GAME LOOP =====================
function loop(){
  requestAnimationFrame(loop);

  let cx=Math.floor(camera.position.x/CHUNK);
  let cz=Math.floor(camera.position.z/CHUNK);

  for(let x=-RENDER;x<=RENDER;x++){
    for(let z=-RENDER;z<=RENDER;z++){
      genChunk(cx+x,cz+z);
    }
  }

  unload(cx,cz);

  let speed=0.15;

  let nx=camera.position.x;
  let nz=camera.position.z;

  let fx=Math.sin(yaw);
  let fz=Math.cos(yaw);

  let rx=Math.cos(yaw);
  let rz=-Math.sin(yaw);

  if(keys["KeyW"]){nx+=fx*speed;nz+=fz*speed;}
  if(keys["KeyS"]){nx-=fx*speed;nz-=fz*speed;}
  if(keys["KeyA"]){nx-=rx*speed;nz-=rz*speed;}
  if(keys["KeyD"]){nx+=rx*speed;nz+=rz*speed;}

  // REAL collision (prevents walking through blocks)
  if(!collide(nx,camera.position.y,nz)){
    camera.position.x=nx;
    camera.position.z=nz;
  }

  renderer.render(scene,camera);
}

loop();

window.addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
