<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voxel Chunk Engine Fix</title>
<style>
body{margin:0;overflow:hidden;background:#000}
canvas{display:block}
#ui{
position:absolute;
top:10px;left:10px;
color:white;
font-family:monospace;
background:#0008;
padding:10px;
}
</style>
</head>
<body>

<div id="ui">Chunk engine: physics + render unified</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

//////////////////////////////
// CORE ENGINE
//////////////////////////////

const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0xaad5ff,40,160);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,30,0);

const renderer=new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.6));

const sun=new THREE.DirectionalLight(0xffffff,1.2);
sun.position.set(100,120,50);
scene.add(sun);

//////////////////////////////
// VOXEL WORLD (SINGLE SOURCE OF TRUTH)
//////////////////////////////

const world=new Map();

function key(x,y,z){return x+","+y+","+z}

// terrain function (used ONLY to generate world ONCE)
function height(x,z){
return Math.floor(Math.sin(x*0.08)*Math.cos(z*0.08)*6+12);
}

//////////////////////////////
// CHUNK SYSTEM
//////////////////////////////

const CHUNK_SIZE=16;
const chunks=new Map();

function chunkKey(x,z){
return x+","+z;
}

//////////////////////////////
// GENERATE VOXEL DATA (REAL WORLD)
//////////////////////////////

function generateVoxelWorld(){

for(let x=-64;x<64;x++){
for(let z=-64;z<64;z++){

let h=height(x,z);

for(let y=0;y<h;y++){
world.set(key(x,y,z),1);
}

}

}

}

generateVoxelWorld();

//////////////////////////////
// CHUNK BUILDER (RENDER = SAME DATA)
//////////////////////////////

const geo=new THREE.BoxGeometry(1,1,1);
const mat=new THREE.MeshStandardMaterial({color:0x3aa655});

function buildChunk(cx,cz){

const group=new THREE.Group();

for(let x=0;x<CHUNK_SIZE;x++){
for(let z=0;z<CHUNK_SIZE;z++){

let wx=cx*CHUNK_SIZE+x;
let wz=cz*CHUNK_SIZE+z;

for(let y=0;y<30;y++){

if(world.has(key(wx,y,wz))){

const cube=new THREE.Mesh(geo,mat);

cube.position.set(wx,y,wz);

group.add(cube);

}

}

}

}

scene.add(group);

return group;

}

//////////////////////////////
// LOAD CHUNKS AROUND PLAYER
//////////////////////////////

function updateChunks(){

let cx=Math.floor(camera.position.x/CHUNK_SIZE);
let cz=Math.floor(camera.position.z/CHUNK_SIZE);

for(let x=-2;x<=2;x++){
for(let z=-2;z<=2;z++){

let id=chunkKey(cx+x,cz+z);

if(!chunks.has(id)){

let chunk=buildChunk(cx+x,cz+z);
chunks.set(id,chunk);

}

}

}

}

//////////////////////////////
// PHYSICS (NOW USES SAME WORLD)
//////////////////////////////

function solid(x,y,z){
return world.has(key(Math.floor(x),Math.floor(y),Math.floor(z)));
}

let vy=0,onGround=false;
let yaw=0,pitch=0;

const keys={};

addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

document.body.onclick=()=>document.body.requestPointerLock();

addEventListener("mousemove",e=>{
if(document.pointerLockElement!==document.body)return;
yaw-=e.movementX*0.002;
pitch-=e.movementY*0.002;
pitch=Math.max(-1.4,Math.min(1.4,pitch));
});

function collide(x,y,z){

for(let dx=-0.3;dx<=0.3;dx+=0.3){
for(let dz=-0.3;dz<=0.3;dz+=0.3){
for(let dy=0;dy<1.8;dy+=0.5){

if(solid(x+dx,y-dy,z+dz))return true;

}}}
return false;

}

//////////////////////////////
// PLAYER UPDATE
//////////////////////////////

function updatePlayer(){

let sp=0.12;

let fx=-Math.sin(yaw);
let fz=-Math.cos(yaw);

let nx=camera.position.x;
let nz=camera.position.z;

if(keys["w"]){nx+=fx*sp;nz+=fz*sp;}
if(keys["s"]){nx-=fx*sp;nz-=fz*sp;}
if(keys["a"]){nx-=Math.cos(yaw)*sp;nz+=Math.sin(yaw)*sp;}
if(keys["d"]){nx+=Math.cos(yaw)*sp;nz-=Math.sin(yaw)*sp;}

if(!collide(nx,camera.position.y,nz)){
camera.position.x=nx;
camera.position.z=nz;
}

vy-=0.02;
let ny=camera.position.y+vy;

if(!collide(camera.position.x,ny,camera.position.z)){
camera.position.y=ny;
onGround=false;
}else{
vy=0;
onGround=true;
}

if(keys[" "]&&onGround){
vy=0.3;
onGround=false;
}

camera.rotation.order="YXZ";
camera.rotation.y=yaw;
camera.rotation.x=pitch;

}

//////////////////////////////
// GAME LOOP
//////////////////////////////

function animate(){

requestAnimationFrame(animate);

updateChunks();   // render system
updatePlayer();   // physics system

renderer.render(scene,camera);

}

animate();

addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
