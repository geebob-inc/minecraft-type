<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Mini Minecraft 3D</title>
<style>
  body { margin: 0; overflow: hidden; }
  #ui {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-family: sans-serif;
    background: rgba(0,0,0,0.4);
    padding: 10px;
    border-radius: 10px;
  }
</style>
</head>
<body>

<div id="ui">
  Hotbar: 1 Grass | 2 Dirt | 3 Stone | 4 Wood
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
import { PointerLockControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/PointerLockControls.js";

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// Controls
let controls = new PointerLockControls(camera, document.body);
document.addEventListener("click", () => controls.lock());
scene.add(controls.getObject());

// Light
let light = new THREE.HemisphereLight(0xffffff, 0x444444);
scene.add(light);

// Block types
const materials = {
  1: new THREE.MeshBasicMaterial({ color: 0x3cb043 }), // grass
  2: new THREE.MeshBasicMaterial({ color: 0x8B5A2B }), // dirt
  3: new THREE.MeshBasicMaterial({ color: 0x808080 }), // stone
  4: new THREE.MeshBasicMaterial({ color: 0x8B4513 })  // wood
};

// World storage
let blocks = [];

// Terrain generation (simple hills)
function height(x, z) {
  return Math.floor(
    Math.sin(x * 0.3) * 3 +
    Math.cos(z * 0.3) * 3 +
    5
  );
}

// Create terrain
for (let x = -20; x < 20; x++) {
  for (let z = -20; z < 20; z++) {
    let h = height(x, z);

    for (let y = 0; y < h; y++) {
      let type = 3;
      if (y === h - 1) type = 1;
      else if (y > h - 3) type = 2;

      addBlock(x, y, z, type);
    }
  }
}

function addBlock(x, y, z, type) {
  let geo = new THREE.BoxGeometry(1,1,1);
  let mesh = new THREE.Mesh(geo, materials[type]);
  mesh.position.set(x, y, z);
  scene.add(mesh);

  blocks.push(mesh);
}

// Movement + gravity
let velocity = new THREE.Vector3();
let direction = new THREE.Vector3();
let canJump = false;

let keys = {};
document.addEventListener("keydown", e => keys[e.code] = true);
document.addEventListener("keyup", e => keys[e.code] = false);

// Block placement
let currentBlock = 1;

document.addEventListener("keydown", e => {
  if (e.key === "1") currentBlock = 1;
  if (e.key === "2") currentBlock = 2;
  if (e.key === "3") currentBlock = 3;
  if (e.key === "4") currentBlock = 4;
});

document.addEventListener("mousedown", (e) => {
  let ray = new THREE.Raycaster();
  ray.setFromCamera(new THREE.Vector2(0,0), camera);

  let hits = ray.intersectObjects(blocks);

  if (hits.length > 0) {
    let hit = hits[0];

    if (e.button === 0) {
      // remove block
      scene.remove(hit.object);
      blocks = blocks.filter(b => b !== hit.object);
    }

    if (e.button === 2) {
      // place block
      let pos = hit.point.add(hit.face.normal);
      addBlock(
        Math.round(pos.x),
        Math.round(pos.y),
        Math.round(pos.z),
        currentBlock
      );
    }
  }
});

document.addEventListener("contextmenu", e => e.preventDefault());

// Game loop
function animate() {
  requestAnimationFrame(animate);

  let speed = 0.1;

  direction.z = Number(keys["KeyW"]) - Number(keys["KeyS"]);
  direction.x = Number(keys["KeyD"]) - Number(keys["KeyA"]);
  direction.normalize();

  if (keys["Space"] && canJump) {
    velocity.y = 0.2;
    canJump = false;
  }

  velocity.y -= 0.01; // gravity

  controls.moveRight(direction.x * speed);
  controls.moveForward(direction.z * speed);

  controls.getObject().position.y += velocity.y;

  if (controls.getObject().position.y < 2) {
    velocity.y = 0;
    controls.getObject().position.y = 2;
    canJump = true;
  }

  renderer.render(scene, camera);
}

animate();

window.addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
